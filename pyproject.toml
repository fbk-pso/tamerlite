[project]
name = "tamerlite"
version = "0.1.0"
description = "Heuristic search-based temporal planner"
readme = "README.md"
requires-python = ">=3.10"
license = "GPL-3.0-only"
authors = [
    {name = "FBK PSO Unit", email = "tamer@fbk.eu"}
]
urls = { "Homepage" = "https://github.com/fbk-pso/tamerlite" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10"
]

dependencies = [
    "rustamer~=0.1.0"
]

[project.optional-dependencies]
test = [
    "pytest==8.4.1",
    "pytest-regressions==2.8.3"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tamerlite"]