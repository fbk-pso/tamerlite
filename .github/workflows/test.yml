name: test

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.51.0"

      - name: Install Rust toolchain (rustfmt, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync environment
        run: uv sync --all-extras --frozen

      - name: Version guard
        run: just check-versions

      - name: pre-commit
        run: just precommit

      - name: mypy
        run: just typecheck

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.51.0"

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Sync environment (project + workspace + dev)
        run: uv sync --all-extras --frozen --python ${{ inputs.python-version }}

      - name: Clone unified-planning test cases (matching the locked commit)
        run: |
          sha=$(uv run python -c "import tomllib; d = tomllib.load(open('uv.lock', 'rb')); print(next(p['source']['git'].rsplit('#', 1)[1] for p in d['package'] if p['name'] == 'unified-planning'))")
          git clone --filter=blob:none https://github.com/aiplan4eu/unified-planning.git up-checkout
          git -C up-checkout checkout "$sha"

      - name: Register tamerlite engine
        run: |
          echo -e "[engine tamerlite]\nmodule_name: tamerlite.engine\nclass_name: TamerLite" > .up.ini

      - name: Run UP test report
        run: uv run python up-checkout/up_test_cases/report.py tamerlite

      - name: Run TamerLite pytest suite
        env:
          PYTHONPATH: up-checkout/up_test_cases
        run: just test
