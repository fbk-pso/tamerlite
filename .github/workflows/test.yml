name: test

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Black check
        run: |
          python3 -m pip install black==25.12.0
          python3 -m black --check .

      - name: MyPy check
        run: |
          python3 -m pip install mypy==1.19.1
          python3 -m mypy tamerlite

  test:
    needs: [basic-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{inputs.python-version}}

      - name: Build rustamer
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rustamer
          command: build
          args: --release

      - name: Install unified-planning and tamerlite
        run: |
          python3 -m pip install --find-links rustamer/target/wheels/ rustamer
          python3 -m pip install .[test]
          git clone https://github.com/aiplan4eu/unified-planning.git
          python3 -m pip install -r unified-planning/requirements.txt
          python3 -m pip install unified-planning/
          echo -e "[engine tamerlite]\nmodule_name: tamerlite.engine\nclass_name: TamerLite" > .up.ini

      - name: Run UP tests
        run: |
          python3 unified-planning/up_test_cases/report.py tamerlite

      - name: Run Tamerlite tests
        run: |
            export PYTHONPATH="unified-planning/up_test_cases"
            python3 -m pytest tests/