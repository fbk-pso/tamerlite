name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build rustamer
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rustamer
          command: build
          args: --release
      - name: Install unified-planning and tamerlite
        run: |
          python3 -m pip install --find-links rustamer/target/wheels/ rustamer
          python3 -m pip install .
          git clone https://github.com/aiplan4eu/unified-planning.git
          python3 -m pip install -r unified-planning/requirements.txt
          python3 -m pip install unified-planning/
          python3 -m pip install matplotlib
          echo -e "[engine tamerlite]\nmodule_name: tamerlite.engine\nclass_name: TamerLite" > .up.ini
      - name: Install pytest
        run: |
          python3 -m pip install pytest
      - name: Run UP tests
        run: |
          python3 unified-planning/up_test_cases/report.py tamerlite
      - name: Run Tamerlite tests
        run: |
            export PYTHONPATH="unified-planning/up_test_cases"
            python3 -m pytest tests/

  linux:
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        # target: [x86_64, x86, aarch64, armv7, s390x, ppc64le]
        target: [x86_64]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rustamer
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: rustamer/dist

  windows:
    runs-on: windows-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        # target: [x64, x86]
        target: [x64]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rustamer
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: rustamer/dist

  macos:
    runs-on: macos-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rustamer
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: rustamer/dist

  sdist:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rustamer
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: rustamer/dist

  tamerlite:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        run: |
          python3 -m pip install wheel setuptools
          python3 setup.py sdist --format=gztar
          python3 setup.py bdist_wheel
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-tamerlite
          path: dist

  merge-artifacts:
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist, tamerlite]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: wheels
          delete-merged: true

