name: build-and-release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    uses: ./.github/workflows/test.yml

    with:
      python-version: ${{matrix.python-version}}

  stamp-dev:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Stamp dev version
        run: python ci/stamp_dev_version.py
      - name: Upload stamped manifests
        uses: actions/upload-artifact@v7
        with:
          name: stamped-manifests
          path: |
            pyproject.toml
            Cargo.toml
            crates/rustamer/pyproject.toml

  linux:
    runs-on: ubuntu-latest
    needs: [test, stamp-dev]
    if: |
      always()
      && needs.test.result == 'success'
      && (needs.stamp-dev.result == 'success' || needs.stamp-dev.result == 'skipped')
    strategy:
      matrix:
        # target: [x86_64, x86, aarch64, armv7, s390x, ppc64le]
        target: [x86_64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14
      - name: Download stamped manifests
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v8
        with:
          name: stamped-manifests
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/rustamer
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux
          path: crates/rustamer/dist

  windows:
    runs-on: windows-latest
    needs: [test, stamp-dev]
    if: |
      always()
      && needs.test.result == 'success'
      && (needs.stamp-dev.result == 'success' || needs.stamp-dev.result == 'skipped')
    strategy:
      matrix:
        # target: [x64, x86]
        target: [x64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14
          architecture: ${{ matrix.target }}
      - name: Download stamped manifests
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v8
        with:
          name: stamped-manifests
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/rustamer
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows
          path: crates/rustamer/dist

  macos:
    runs-on: macos-latest
    needs: [test, stamp-dev]
    if: |
      always()
      && needs.test.result == 'success'
      && (needs.stamp-dev.result == 'success' || needs.stamp-dev.result == 'skipped')
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14
      - name: Download stamped manifests
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v8
        with:
          name: stamped-manifests
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/rustamer
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/rustamer/dist

  sdist:
    runs-on: ubuntu-latest
    needs: [test, stamp-dev]
    if: |
      always()
      && needs.test.result == 'success'
      && (needs.stamp-dev.result == 'success' || needs.stamp-dev.result == 'skipped')
    steps:
      - uses: actions/checkout@v7
      - name: Download stamped manifests
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v8
        with:
          name: stamped-manifests
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/rustamer
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: crates/rustamer/dist

  tamerlite:
    runs-on: ubuntu-latest
    needs: [test, stamp-dev]
    if: |
      always()
      && needs.test.result == 'success'
      && (needs.stamp-dev.result == 'success' || needs.stamp-dev.result == 'skipped')
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: "1.51.0"
      - name: Download stamped manifests
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v8
        with:
          name: stamped-manifests
      - name: Build sdist + wheel
        run: just build-python
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-tamerlite
          path: dist

  merge-artifacts:
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist, tamerlite]
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: wheels
          pattern: wheels-*
          delete-merged: false

  publish-rustamer:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, macos, sdist]
    runs-on: ubuntu-latest
    environment: pypi-rustamer
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Keep only rustamer artifacts
        run: |
          find dist -mindepth 1 -type f ! -name 'rustamer-*' -delete
          ls -1 dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-tamerlite:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [tamerlite]
    runs-on: ubuntu-latest
    environment: pypi-tamerlite
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels-tamerlite
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-rustamer, publish-tamerlite]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: artifacts/*

  dev-release:
    if: github.ref == 'refs/heads/main'
    needs: [linux, windows, macos, sdist, tamerlite]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: artifacts
      - name: Replace rolling pre-release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          short=$(git rev-parse --short=7 HEAD)
          stamp=$(date -u +%Y-%m-%dT%H:%MZ)
          gh release create dev artifacts/* \
            --prerelease \
            --target ${{ github.sha }} \
            --title "Development build (main)" \
            --notes "Built from commit ${short} on ${stamp}. Install a wheel directly from this release page."
